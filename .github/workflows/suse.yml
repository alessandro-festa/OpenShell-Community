name: Build suse image

on:
  push:
    branches: [main]
    paths:
      - "sandboxes/suse/**"
    tags:
      - "suse/v*.*.*"
  pull_request:
    branches: [main]
    paths:
      - "sandboxes/suse/**"

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/openshell-community/sandboxes/suse

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  # ---------------------------------------------------------------------------
  # Build the image and run a Trivy vulnerability scan
  # ---------------------------------------------------------------------------
  build-and-scan:
    name: Build and scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: sandboxes/suse/
          push: false
          load: true
          tags: ${{ env.IMAGE }}:scan

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@0.31.0
        with:
          image-ref: ${{ env.IMAGE }}:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: false

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # ---------------------------------------------------------------------------
  # Publish to ghcr.io — runs only on semver tag pushes
  # ---------------------------------------------------------------------------
  publish:
    name: Publish
    needs: build-and-scan
    if: startsWith(github.ref, 'refs/tags/suse/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=match,pattern=suse/(v\d+\.\d+\.\d+),group=1
            type=sha,prefix=

      - name: Build and push with attestations
        uses: docker/build-push-action@v6
        with:
          context: sandboxes/suse/
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
