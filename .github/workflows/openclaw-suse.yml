name: Build openclaw-suse image

on:
  push:
    branches: [main]
    paths:
      - "sandboxes/openclaw-suse/**"
      - "sandboxes/suse/**"        # rebuild when the base changes
    tags:
      - "openclaw-suse/v*.*.*"
  pull_request:
    branches: [main]
    paths:
      - "sandboxes/openclaw-suse/**"
      - "sandboxes/suse/**"

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/openshell-community/sandboxes/openclaw-suse
  BASE_IMAGE: ghcr.io/${{ github.repository_owner }}/openshell-community/sandboxes/suse:latest

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  # ---------------------------------------------------------------------------
  # Build and run a Trivy vulnerability scan
  # ---------------------------------------------------------------------------
  build-and-scan:
    name: Build and scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: sandboxes/openclaw-suse/
          push: false
          load: true
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
          tags: ${{ env.IMAGE }}:scan

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          # SLE BCI 16 base ships with CRITICAL CVEs that have no
          # upstream patch yet (claude#85). Skip those so the publish
          # chain unblocks; CRITICAL/HIGH findings that DO have a fix
          # still fail the build.
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # ---------------------------------------------------------------------------
  # Publish to ghcr.io — runs only on semver tag pushes
  # ---------------------------------------------------------------------------
  publish:
    name: Publish
    needs: build-and-scan
    if: startsWith(github.ref, 'refs/tags/openclaw-suse/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=match,pattern=openclaw-suse/(v\d+\.\d+\.\d+),group=1
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push with attestations
        uses: docker/build-push-action@v6
        with:
          context: sandboxes/openclaw-suse/
          push: true
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
